        // NEW PACKAGE CONFIGURATION
        const PACKAGE_CONFIG = {
            attributes: [
                { name: "active", type: "boolean" },
                { name: "archived", type: "boolean" },
                { name: "name", type: "string" },
                { name: "currency-code", type: "string" },

                { name: "pricing-mode", type: "string" },
                { name: "lock-percent-allocation", type: "boolean" },
                { name: "pricing-floor", type: "number" },
                { name: "pricing-ceiling", type: "number" },
                { name: "billable", type: "boolean" },
                { name: "billing-source", type: "string" },
                { name: "billing-schedule", type: "string" },
                { name: "billing-cap", type: "string" },
                { name: "pricing-budget-type", type: "string" },
                { name: "pricing-units", type: "number" },
                { name: "cost-per-unit", type: "number" },

        };

        const RAW_CSV_DATA = `

        `;

        const POST_DEFAULTS = {
            'campaigns': [
                'name', 'start-date', 'end-date', 'time-zone', 'currency-code', 
                'billing-source', 'billing-cap', 'billing-period', 
                'rel:advertiser', 'rel:bill-to-account'
            ],
            'line-items': [
                'ad-server', 'ad-server-network-code', 'end-date', 'start-date', 
                'time-zone', 'currency-code', 'cost-basis', 'cost-per-unit', 
                'contracted-units', 'units', 'external-id', 'billing-cap', 
                'billing-schedule', 'billing-source', 
                'rel:campaign', 'rel:product'
            ],
            'groups': [
                'billable', 'billing-cap', 'billing-schedule', 'billing-source', 
                'budget', 'contracted-units', 'cost-basis', 'end-date', 'name', 
                'start-date', 'pricing-budget-type', 'time-zone', 
                'rel:campaign'
            ],
            'packages': [
                'name', 'currency-code', 'pricing-mode', 'cost-basis', 'billable'
            ],
            'accounts': [
                'name'
            ],
            'opportunities': [
                'name', 'close-date', 'stage-name'
            ]
        };

        const parseData = (csv) => {
            const lines = csv.trim().split('\n');
            const data = {};
            lines.forEach(line => {
                const parts = line.trim().split(',');
                const resource = parts[0];
                const attribute = parts[1];
                if (resource && attribute) {
                    if (!data[resource]) data[resource] = [];
                    data[resource].push(attribute);
                }
            });
            Object.keys(data).forEach(key => data[key].sort());
            return data;
        };

        const CSV_DATA_MAP = parseData(RAW_CSV_DATA);

        // --- Components ---

        const Icon = ({ name, size = 18, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const App = () => {
            const [selectedResource, setSelectedResource] = useState('campaigns');
            const [selections, setSelections] = useState({});
            const [copied, setCopied] = useState(false);
            const [detectedTypes, setDetectedTypes] = useState({}); 

            // Request Method State
            const [requestMethod, setRequestMethod] = useState('POST');
            
            // PATCH Options State
            const [patchParams, setPatchParams] = useState({
                skip_push_to_ad_server: false,
                skip_push_to_crm: false,
                skip_missing_custom_fields: false
            });

            // Custom Fields Config State
            const [showCustomFieldsModal, setShowCustomFieldsModal] = useState(false);
            const [customFieldsConfig, setCustomFieldsConfig] = useState([{ id: 1, count: 1 }]); 

            // Import Modal State
            const [showImport, setShowImport] = useState(false);
            const [importText, setImportText] = useState("");

            const getActiveConfig = (resource) => {
                if (resource === 'campaigns') return CAMPAIGN_CONFIG;
                if (resource === 'line-items') return LINE_ITEM_CONFIG;
                if (resource === 'groups') return GROUP_CONFIG;
                if (resource === 'packages') return PACKAGE_CONFIG;
                return null;
            };

            // Initialize or Defaults
            useEffect(() => {
                const currentSelections = selections[selectedResource];
                if (!currentSelections) {
                    applyDefaults(selectedResource, requestMethod);
                }
            }, [selectedResource]);

            // Effect: When Method changes to POST, apply defaults; when PATCH, clear defaults
            useEffect(() => {
                if (requestMethod === 'POST') {
                    applyDefaults(selectedResource, 'POST');
                } else {
                    // PATCH: Clear selections for the active resource
                    setSelections(prev => ({
                        ...prev,
                        [selectedResource]: { attributes: {}, relationships: {} }
                    }));
                }
            }, [requestMethod]);

            // WATCHER: Auto-select skip_missing_custom_fields if custom-fields is selected in PATCH mode
            useEffect(() => {
                if (requestMethod === 'PATCH') {
                    const resSel = selections[selectedResource]?.attributes || {};
                    // If custom-fields is selected (true), force skip_missing_custom_fields to true
                    if (resSel['custom-fields'] && !patchParams.skip_missing_custom_fields) {
                        setPatchParams(prev => ({ ...prev, skip_missing_custom_fields: true }));
                    }
                }
            }, [selections, requestMethod, selectedResource, patchParams.skip_missing_custom_fields]);

            const applyDefaults = (resource, method) => {
                if (method !== 'POST') {
                    setSelections(prev => {
                        if (prev[resource]) return prev;
                        return {
                            ...prev,
                            [resource]: { attributes: {}, relationships: {} }
                        };
                    });
                    return;
                }

                const defaults = POST_DEFAULTS[resource];
                if (!defaults) {
                     setSelections(prev => {
                        if (prev[resource]) return prev;
                        return { ...prev, [resource]: { attributes: {}, relationships: {} } };
                     });
                     return;
                }

                const newAttrs = {};
                const newRels = {};

                defaults.forEach(def => {
                    if (def.startsWith('rel:')) {
                        const name = def.replace('rel:', '');
                        newRels[name] = true;
                    } else {
                        newAttrs[def] = true;
                    }
                });

                setSelections(prev => ({
                    ...prev,
                    [resource]: {
                        attributes: newAttrs,
                        relationships: newRels
                    }
                }));
            };
            
            const handlePatchParamToggle = (param) => {
                setPatchParams(prev => ({
                    ...prev,
                    [param]: !prev[param]
                }));
            };

            // --- Category Selection Logic ---
            const handleCategoryAction = (category, action) => {
                const config = getActiveConfig(selectedResource);
                if (!config) return;

                const categoryAttrs = config.attributes.filter(a => a.category === category);
                
                setSelections(prev => {
                    const resSel = prev[selectedResource] || { attributes: {}, relationships: {} };
                    const newAttrs = { ...resSel.attributes };
                    
                    categoryAttrs.forEach(attr => {
                        newAttrs[attr.name] = (action === 'select');
                    });

                    return {
                        ...prev,
                        [selectedResource]: {
                            ...resSel,
                            attributes: newAttrs
                        }
                    };
                });
            };

            // --- Custom Field Logic ---
            const addCustomFieldRow = () => {
                if (customFieldsConfig.length >= 20) return;
                const newId = customFieldsConfig.length > 0 ? Math.max(...customFieldsConfig.map(c => c.id)) + 1 : 1;
                setCustomFieldsConfig([...customFieldsConfig, { id: newId, count: 1 }]);
            };

            const removeCustomFieldRow = (id) => {
                setCustomFieldsConfig(customFieldsConfig.filter(c => c.id !== id));
            };

            const updateCustomFieldCount = (id, newCount) => {
                let count = parseInt(newCount);
                if (isNaN(count)) count = 1;
                if (count < 1) count = 1;
                if (count > 20) count = 20;
                
                setCustomFieldsConfig(customFieldsConfig.map(c => 
                    c.id === id ? { ...c, count } : c
                ));
            };

            // --- Selection Logic ---
            const handleToggle = (type, name) => {
                setSelections(prev => {
                    const prevResSel = prev[selectedResource] || { attributes: {}, relationships: {} };
                    const prevGroupSel = prevResSel[type] || {};
                    return {
                        ...prev,
                        [selectedResource]: {
                            ...prevResSel,
                            [type]: { ...prevGroupSel, [name]: !prevGroupSel[name] }
                        }
                    };
                });
            };

            const handleSelectAll = () => {
                const config = getActiveConfig(selectedResource);
                const resSel = { attributes: {}, relationships: {} };
                
                if (config) {
                    config.attributes.forEach(a => resSel.attributes[a.name] = true);
                    config.relationships.forEach(r => resSel.relationships[r.name] = true);
                } else {
                    const attrs = CSV_DATA_MAP[selectedResource] || [];
                    attrs.forEach(a => resSel.attributes[a] = true);
                }
                setSelections(prev => ({ ...prev, [selectedResource]: resSel }));
            };

            const handleDeselectAll = () => {
                setSelections(prev => ({ 
                    ...prev, 
                    [selectedResource]: { attributes: {}, relationships: {} } 
                }));
            };

            const handleImportJSON = () => {
                 try {
                    const parsed = JSON.parse(importText);
                    const attributes = parsed.data?.attributes || parsed.attributes || parsed;
                    const relationships = parsed.data?.relationships || parsed.relationships || {};
                    
                    const resSel = { attributes: {}, relationships: {} };
                    
                    Object.keys(attributes).forEach(key => resSel.attributes[key] = true);
                    Object.keys(relationships).forEach(key => resSel.relationships[key] = true);

                    setSelections(prev => ({ ...prev, [selectedResource]: resSel }));
                    setShowImport(false);
                    setImportText("");
                    alert(`Imported!`);
                } catch (e) {
                    alert("Invalid JSON format.");
                }
            };
            
            // --- Output Generation ---
            const generateOutput = () => {
                const resSel = selections[selectedResource] || { attributes: {}, relationships: {} };
                const activeAttrs = Object.keys(resSel.attributes).filter(k => resSel.attributes[k]);
                const activeRels = Object.keys(resSel.relationships).filter(k => resSel.relationships[k]);
                const types = detectedTypes[selectedResource] || {};
                const config = getActiveConfig(selectedResource);

                // --- URL GENERATION ---
                const urlSuffix = requestMethod === 'POST' ? '' : '/{{id}}';
                let url = `https://api.placements.io/v1/${selectedResource}${urlSuffix}`;
                
                if (requestMethod === 'PATCH') {
                    const params = [];
                    if (patchParams.skip_push_to_ad_server) params.push('skip_push_to_ad_server=true');
                    if (patchParams.skip_push_to_crm) params.push('skip_push_to_crm=true');
                    if (patchParams.skip_missing_custom_fields) params.push('skip_missing_custom_fields=true');
                    
                    if (params.length > 0) {
                        url += '?' + params.join('&');
                    }
                }

                let attrsLines = activeAttrs
                    .filter(a => a !== 'id') 
                    .map(attr => {
                        if (attr === 'custom-fields') {
                            if (customFieldsConfig.length === 0) return `      "custom-fields": {}`;
                            let globalValueIndex = 0;
                            const fields = customFieldsConfig.map((row, idx) => {
                                const key = `{{cf${idx + 1}}}`;
                                let val = "";
                                if (row.count === 1) {
                                    val = `"{{value${globalValueIndex}}}"`;
                                    globalValueIndex++;
                                } else {
                                    const valArr = [];
                                    for(let i=0; i<row.count; i++) {
                                        valArr.push(`"{{value${globalValueIndex}}}"`);
                                        globalValueIndex++;
                                    }
                                    val = `[${valArr.join(', ')}]`;
                                }
                                return `        "${key}": ${val}`;
                            });
                            return `      "custom-fields": {\n${fields.join(',\n')}\n      }`;
                        }

                        let value = `"${attr}": "{{${attr}}}"`; 
                        
                        if (config) {
                            const attrConfig = config.attributes.find(c => c.name === attr);
                            if (attrConfig) {
                                if (attrConfig.type === 'boolean' || attrConfig.type === 'number') value = `"${attr}": {{${attr}}}`;
                                else if (attrConfig.type === 'array') value = `"${attr}": []`;
                                else if (attrConfig.type === 'object') value = `"${attr}": {{${attr}}}`;
                            }
                        } else {
                            const type = types[attr] || 'string';
                            if (type === 'boolean' || type === 'number') value = `"${attr}": {{${attr}}}`;
                            else if (type === 'array') value = `"${attr}": ["{{${attr}}}"]`;
                            else if (type === 'object') value = `"${attr}": {{${attr}}}`;
                        }
                        return `      ${value}`;
                    })
                    .join(',\n');

                let relsLines = "";
                if (activeRels.length > 0) {
                    relsLines = activeRels.map(rel => {
                        let relType = "unknown";
                        if (config) {
                            const rConfig = config.relationships.find(r => r.name === rel);
                            if (rConfig) relType = rConfig.type;
                        }
                        return `      "${rel}": {
        "data": {
          "type": "${relType}",
          "id": "{{${rel}_id}}"
        }
      }`;
                    }).join(',\n');
                }

                const attrSection = attrsLines ? `\n    "attributes": {\n${attrsLines}\n    }` : "";
                const relSection = relsLines ? `,\n    "relationships": {\n${relsLines}\n    }` : "";
                const idLine = requestMethod === 'POST' ? '' : `\n    "id": "{{id}}",`;

                const typeSuffix = (activeAttrs.length > 0 || activeRels.length > 0) ? ',' : '';

                const jsonString = `{
  "data": {${idLine}
    "type": "${selectedResource}"${typeSuffix}${attrSection}${relSection}
  }
}`;
                return { url, json: jsonString, activeAttrs, activeRels };
            };

            const { url, json, activeAttrs, activeRels } = generateOutput();

            const copyToClipboard = (text) => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            
            const downloadExcel = () => {
                 const allFields = [...activeAttrs, ...activeRels];
                 if (allFields.length === 0) { alert("Select something first"); return; }
                 const wsData = [allFields];
                 const wb = XLSX.utils.book_new();
                 const ws = XLSX.utils.aoa_to_sheet(wsData);
                 XLSX.utils.book_append_sheet(wb, ws, selectedResource);
                 XLSX.writeFile(wb, `${selectedResource}_import.xlsx`);
            };

            // Common Checkbox Renderer
            const CheckboxItem = ({ label, type, isChecked, onToggle, extra }) => (
                <label className={`flex items-start p-3 rounded-lg border cursor-pointer transition-all ${isChecked ? (type === 'rel' ? 'border-purple-500 bg-purple-50/50' : 'border-blue-500 bg-blue-50/50') : 'border-gray-200 hover:bg-gray-50'}`}>
                    <input 
                        type="checkbox" 
                        className={`mt-0.5 h-4 w-4 rounded border-gray-300 focus:ring-2 shrink-0 ${type === 'rel' ? 'text-purple-600 focus:ring-purple-500' : 'text-blue-600 focus:ring-blue-500'}`}
                        checked={!!isChecked}
                        onChange={onToggle}
                    />
                    <div className="ml-3 flex-1 flex flex-col min-w-0"> 
                        <div className="flex justify-between items-start gap-2">
                            <span className="text-sm text-gray-700 font-medium break-words leading-tight">{label}</span>
                            {extra}
                        </div>
                    </div>
                    {/* Custom Fields Gear Icon */}
                    {label === 'custom-fields' && isChecked && (
                        <button 
                            onClick={(e) => { e.preventDefault(); setShowCustomFieldsModal(true); }}
                            className="ml-2 p-1 text-gray-400 hover:text-gray-700 hover:bg-gray-200 rounded transition-colors"
                            title="Configure Custom Fields"
                        >
                            <Icon name="settings" size={14} />
                        </button>
                    )}
                </label>
            );

            const renderConfigView = (config) => {
                const resSel = selections[selectedResource] || { attributes: {}, relationships: {} };
                
                // Group Attributes by Category
                const groupedAttrs = {
                    General: [],
                    Xandr: [],
                    Yahoo: []
                };

                config.attributes.forEach(attr => {
                    if (attr.category === 'Xandr') groupedAttrs.Xandr.push(attr);
                    else if (attr.category === 'Yahoo') groupedAttrs.Yahoo.push(attr);
                    else groupedAttrs.General.push(attr);
                });

                return (
                    <div className="flex-1 overflow-y-auto p-6">
                        {/* General Attributes */}
                        <div className="mb-8">
                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-100 pb-2">Attributes (Writable)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {groupedAttrs.General.map(attr => (
                                    <CheckboxItem 
                                        key={attr.name} 
                                        label={attr.name} 
                                        type="attr"
                                        isChecked={resSel.attributes[attr.name]} 
                                        onToggle={() => handleToggle('attributes', attr.name)}
                                        extra={<span className="shrink-0 text-[10px] text-gray-400 uppercase bg-gray-100 px-1.5 rounded leading-none py-0.5">{attr.type}</span>}
                                    />
                                ))}
                            </div>
                        </div>

                        {/* Xandr Attributes */}
                        {groupedAttrs.Xandr.length > 0 && (
                            <div className="mb-8">
                                <div className="flex justify-between items-center mb-4 border-b border-orange-100 pb-2">
                                    <h3 className="text-xs font-bold text-orange-600 uppercase tracking-wider">Xandr Attributes</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => handleCategoryAction('Xandr', 'select')} className="text-[10px] uppercase font-bold text-orange-600 hover:text-orange-800 hover:bg-orange-50 px-2 py-1 rounded">Select All</button>
                                        <button onClick={() => handleCategoryAction('Xandr', 'clear')} className="text-[10px] uppercase font-bold text-gray-400 hover:text-gray-600 hover:bg-gray-50 px-2 py-1 rounded">Clear</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {groupedAttrs.Xandr.map(attr => (
                                        <CheckboxItem 
                                            key={attr.name} 
                                            label={attr.name} 
                                            type="attr"
                                            isChecked={resSel.attributes[attr.name]} 
                                            onToggle={() => handleToggle('attributes', attr.name)}
                                            extra={<span className="shrink-0 text-[10px] text-gray-400 uppercase bg-gray-100 px-1.5 rounded leading-none py-0.5">{attr.type}</span>}
                                        />
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Yahoo Attributes */}
                        {groupedAttrs.Yahoo.length > 0 && (
                            <div className="mb-8">
                                <div className="flex justify-between items-center mb-4 border-b border-violet-100 pb-2">
                                    <h3 className="text-xs font-bold text-violet-600 uppercase tracking-wider">Yahoo Attributes</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => handleCategoryAction('Yahoo', 'select')} className="text-[10px] uppercase font-bold text-violet-600 hover:text-violet-800 hover:bg-violet-50 px-2 py-1 rounded">Select All</button>
                                        <button onClick={() => handleCategoryAction('Yahoo', 'clear')} className="text-[10px] uppercase font-bold text-gray-400 hover:text-gray-600 hover:bg-gray-50 px-2 py-1 rounded">Clear</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {groupedAttrs.Yahoo.map(attr => (
                                        <CheckboxItem 
                                            key={attr.name} 
                                            label={attr.name} 
                                            type="attr"
                                            isChecked={resSel.attributes[attr.name]} 
                                            onToggle={() => handleToggle('attributes', attr.name)}
                                            extra={<span className="shrink-0 text-[10px] text-gray-400 uppercase bg-gray-100 px-1.5 rounded leading-none py-0.5">{attr.type}</span>}
                                        />
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Relationships */}
                        {config.relationships.length > 0 && (
                            <div>
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-100 pb-2">Relationships</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {config.relationships
                                        .filter(rel => !(selectedResource === 'line-items' && requestMethod === 'PATCH' && rel.name === 'product'))
                                        .map(rel => (
                                            <CheckboxItem 
                                                key={rel.name} 
                                                label={rel.name} 
                                                type="rel"
                                                isChecked={resSel.relationships[rel.name]} 
                                                onToggle={() => handleToggle('relationships', rel.name)}
                                                extra={<span className="shrink-0 text-[10px] text-purple-600 bg-purple-100 px-1.5 rounded leading-none py-0.5">{rel.type}</span>}
                                            />
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderGenericView = () => {
                const attrs = CSV_DATA_MAP[selectedResource] || [];
                const resSel = selections[selectedResource] || { attributes: {}, relationships: {} };
                return (
                    <div className="flex-1 overflow-y-auto p-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {attrs.map(attr => (
                                <CheckboxItem 
                                    key={attr} 
                                    label={attr} 
                                    type="attr"
                                    isChecked={resSel.attributes[attr]} 
                                    onToggle={() => handleToggle('attributes', attr)}
                                />
                            ))}
                        </div>
                    </div>
                );
            };

            const activeConfig = getActiveConfig(selectedResource);

            return (
                <div className="flex flex-col h-screen bg-gray-50 relative">
                     {/* Custom Fields Modal */}
                     {showCustomFieldsModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-[500px] max-w-full m-4 flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                                        <Icon name="sliders" size={20} className="text-blue-600" />
                                        Configure Custom Fields
                                    </h3>
                                    <button onClick={() => setShowCustomFieldsModal(false)} className="text-gray-400 hover:text-gray-600">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-3 mb-4">
                                    {customFieldsConfig.map((field, idx) => (
                                        <div key={field.id} className="flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg">
                                            <div className="w-8 h-8 flex items-center justify-center bg-blue-100 text-blue-700 font-bold rounded text-xs">
                                                {idx + 1}
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-[10px] uppercase text-gray-500 font-bold mb-1">Key</label>
                                                <code className="text-xs bg-white px-2 py-1 rounded border border-gray-200 block text-gray-700">
                                                    {"{{cf" + (idx + 1) + "}}"}
                                                </code>
                                            </div>
                                            <div className="w-24">
                                                <label className="block text-[10px] uppercase text-gray-500 font-bold mb-1">Value Count</label>
                                                <input 
                                                    type="number" 
                                                    min="1" 
                                                    max="20" 
                                                    value={field.count}
                                                    onChange={(e) => updateCustomFieldCount(field.id, e.target.value)}
                                                    className="w-full text-xs px-2 py-1 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500"
                                                />
                                            </div>
                                            <div className="pt-4">
                                                <button onClick={() => removeCustomFieldRow(field.id)} className="text-red-400 hover:text-red-600 p-1">
                                                    <Icon name="trash-2" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                    {customFieldsConfig.length === 0 && <p className="text-center text-sm text-gray-400 py-4">No custom fields added.</p>}
                                </div>
                                <div className="flex justify-between items-center pt-2 border-t">
                                    <button 
                                        onClick={addCustomFieldRow} 
                                        disabled={customFieldsConfig.length >= 20}
                                        className="flex items-center gap-2 px-3 py-2 text-sm text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg disabled:opacity-50"
                                    >
                                        <Icon name="plus" size={16} /> Add Field
                                    </button>
                                    <button onClick={() => setShowCustomFieldsModal(false)} className="px-4 py-2 text-sm bg-gray-800 text-white hover:bg-gray-900 rounded-lg">Done</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Import Modal */}
                    {showImport && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-[500px] max-w-full m-4 flex flex-col h-[600px]">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                                        <Icon name="file-json" size={20} className="text-blue-600" />
                                        Import Sample JSON
                                    </h3>
                                    <button onClick={() => setShowImport(false)} className="text-gray-400 hover:text-gray-600">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <textarea 
                                    className="flex-1 w-full p-4 bg-gray-50 border border-gray-300 rounded-lg font-mono text-xs focus:ring-2 focus:ring-blue-500 resize-none mb-4"
                                    placeholder='{ "data": { "attributes": { ... }, "relationships": { ... } } }'
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                ></textarea>
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setShowImport(false)} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                                    <button onClick={handleImportJSON} className="px-4 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg font-medium">Analyze & Import</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                <Icon name="database" />
                            </div>
                            <h1 className="text-xl font-bold text-gray-800">Placements.io Payload Builder</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button className="p-2 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100">
                                <Icon name="settings" size={20} />
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <nav className="w-64 bg-white border-r border-gray-200 flex-shrink-0 overflow-y-auto hidden md:block">
                            <div className="p-4">
                                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Resources</h2>
                                <ul className="space-y-1">
                                    <li>
                                        <button onClick={() => setSelectedResource('campaigns')} className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${selectedResource === 'campaigns' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                                            <Icon name="box" size={16} /><span>Campaigns</span>
                                        </button>
                                    </li>
                                    <li>
                                        <button onClick={() => setSelectedResource('line-items')} className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${selectedResource === 'line-items' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                                            <Icon name="box" size={16} /><span>Line Items</span>
                                        </button>
                                    </li>
                                    <li>
                                        <button onClick={() => setSelectedResource('groups')} className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${selectedResource === 'groups' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                                            <Icon name="box" size={16} /><span>Groups</span>
                                        </button>
                                    </li>
                                    <li>
                                        <button onClick={() => setSelectedResource('packages')} className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${selectedResource === 'packages' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                                            <Icon name="box" size={16} /><span>Packages</span>
                                        </button>
                                    </li>
                                    {Object.keys(CSV_DATA_MAP).map(resource => (
                                        (resource !== 'campaigns' && resource !== 'line-items' && resource !== 'groups' && resource !== 'packages') ? (
                                        <li key={resource}>
                                            <button onClick={() => setSelectedResource(resource)} className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${selectedResource === resource ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                                                <Icon name="box" size={16} /><span className="capitalize">{resource}</span>
                                            </button>
                                        </li>
                                        ) : null
                                    ))}
                                </ul>
                            </div>
                        </nav>

                        {/* Main Content */}
                        <main className="flex-1 flex flex-col min-w-0 bg-white">
                            <div className="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                                <h2 className="text-lg font-medium text-gray-900 capitalize flex items-center gap-2">{selectedResource}</h2>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowImport(true)} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded border border-blue-200">
                                        <Icon name="file-json" size={14} /> Import
                                    </button>
                                    <div className="h-6 w-px bg-gray-300 mx-1"></div>
                                    <button onClick={handleSelectAll} className="px-3 py-1.5 text-xs font-medium text-gray-700 bg-white hover:bg-gray-50 rounded border border-gray-300">Select All</button>
                                    <button onClick={handleDeselectAll} className="px-3 py-1.5 text-xs font-medium text-gray-700 bg-white hover:bg-gray-50 rounded border border-gray-300">Clear</button>
                                </div>
                            </div>
                            {activeConfig ? renderConfigView(activeConfig) : renderGenericView()}
                        </main>

                        {/* Right Panel */}
                        <aside className="w-96 bg-gray-900 text-white flex flex-col border-l border-gray-700 shadow-xl z-20">
                            <div className="p-4 border-b border-gray-700 flex justify-between items-center">
                                <h3 className="text-sm font-semibold uppercase tracking-wider text-gray-400">Postman Configuration</h3>
                            </div>
                            <div className="p-4 border-b border-gray-800">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-xs text-gray-400 font-medium">Request URL</label>
                                    {/* METHOD TOGGLE DROPDOWN */}
                                    <select 
                                        value={requestMethod}
                                        onChange={(e) => setRequestMethod(e.target.value)}
                                        className="bg-gray-800 text-white text-[10px] font-bold py-0.5 px-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500 cursor-pointer"
                                    >
                                        <option value="POST">POST</option>
                                        <option value="PATCH">PATCH</option>
                                    </select>
                                </div>
                                <div className="bg-black p-3 rounded border border-gray-700 font-mono text-xs break-all text-green-400 relative group">
                                    {url}
                                    <button onClick={() => copyToClipboard(url)} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-1 bg-gray-700 rounded hover:bg-gray-600 transition-all">
                                        <Icon name="copy" size={14} className="text-white" />
                                    </button>
                                </div>
                                {/* PATCH Options */}
                                {requestMethod === 'PATCH' && (
                                    <div className="mt-3 flex flex-col gap-2">
                                        <label className="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-white transition-colors">
                                            <input 
                                                type="checkbox" 
                                                checked={patchParams.skip_push_to_ad_server}
                                                onChange={() => handlePatchParamToggle('skip_push_to_ad_server')}
                                                className="rounded bg-gray-700 border-gray-600 text-blue-500 focus:ring-0 focus:ring-offset-0 h-3 w-3"
                                            />
                                            <span className="text-[10px]">skip_push_to_ad_server</span>
                                        </label>
                                        <label className="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-white transition-colors">
                                            <input 
                                                type="checkbox" 
                                                checked={patchParams.skip_push_to_crm}
                                                onChange={() => handlePatchParamToggle('skip_push_to_crm')}
                                                className="rounded bg-gray-700 border-gray-600 text-blue-500 focus:ring-0 focus:ring-offset-0 h-3 w-3"
                                            />
                                            <span className="text-[10px]">skip_push_to_crm</span>
                                        </label>
                                        <label className="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-white transition-colors">
                                            <input 
                                                type="checkbox" 
                                                checked={patchParams.skip_missing_custom_fields}
                                                onChange={() => handlePatchParamToggle('skip_missing_custom_fields')}
                                                className="rounded bg-gray-700 border-gray-600 text-blue-500 focus:ring-0 focus:ring-offset-0 h-3 w-3"
                                            />
                                            <span className="text-[10px]">skip_missing_custom_fields</span>
                                        </label>
                                    </div>
                                )}
                            </div>
                            <div className="flex-1 flex flex-col min-h-0">
                                <div className="p-4 pb-2 flex justify-between items-center bg-gray-900">
                                    <label className="text-xs text-gray-400 font-medium">JSON Body</label>
                                    <button onClick={() => copyToClipboard(json)} className="flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
                                        {copied ? <Icon name="check" size={12}/> : <Icon name="copy" size={12}/>}
                                        {copied ? 'Copied' : 'Copy'}
                                    </button>
                                </div>
                                <div className="flex-1 relative overflow-hidden bg-[#1e1e1e]">
                                    <pre className="absolute inset-0 p-4 overflow-auto font-mono text-xs text-blue-100 custom-scrollbar">{json}</pre>
                                </div>
                            </div>
                            <div className="p-4 bg-gray-800 border-t border-gray-700">
                                <button onClick={downloadExcel} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-md text-sm font-medium transition-colors shadow-lg">
                                    <Icon name="file-spreadsheet" size={16} /> Download Excel Template
                                </button>
                                <p className="text-[10px] text-gray-500 mt-2 text-center">Includes {activeAttrs.length} attrs, {activeRels.length} rels.</p>
                            </div>
                        </aside>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
