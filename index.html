<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- Gemini API Configuration ---
        const apiKey = ""; 

        async function callGemini(systemPrompt, userPrompt, activeKey) {
            if (!activeKey) {
                throw new Error("Missing API Key");
            }

            const payload = {
                contents: [{ 
                    parts: [{ text: userPrompt }] 
                }],
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                },
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            const delays = [1000, 2000, 4000];
            
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        }
                    );

                    if (!response.ok) {
                        const errorBody = await response.text();
                        console.error("API Error Detail:", errorBody);
                        if (response.status === 429 && i < delays.length) {
                            await new Promise(resolve => setTimeout(resolve, delays[i]));
                            continue;
                        }
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    return JSON.parse(text);

                } catch (error) {
                    if (i === delays.length) {
                        throw error;
                    }
                }
            }
        }

        // --- Data Definitions ---

        // Specialized Campaign Config based on User Request
        const CAMPAIGN_CONFIG = {
            attributes: [
                { name: "archived", type: "boolean" },
                { name: "name", type: "string" },
                { name: "description", type: "string" },
                { name: "start-date", type: "string" },
                { name: "end-date", type: "string" },
                { name: "time-zone", type: "string" },
                { name: "currency-code", type: "string" },
                { name: "budget", type: "number" },
                { name: "po-number", type: "string" },
                { name: "probability", type: "number" },
                { name: "campaign-agency-commission", type: "number" },
                { name: "custom-fields", type: "object" },
                { name: "trafficker-info", type: "object" },
                { name: "sales-planner-info", type: "object" },
                { name: "primary-salesperson-info", type: "object" },
                { name: "secondary-salespeople-info", type: "array" },
                { name: "billing-source", type: "string" },
                { name: "billing-schedule", type: "string" },
                { name: "billing-cap", type: "string" },
                { name: "billing-period", type: "string" },
                { name: "external-id", type: "string" },
                { name: "payment-terms", type: "string" },
                { name: "last-modified", type: "string" },
                { name: "uid", type: "string" },
                { name: "yahoo-dsp-budget-type", type: "string" },
                { name: "yahoo-dsp-budget", type: "number" }
            ],
            relationships: [
                { name: "advertiser", type: "accounts" },
                { name: "agency", type: "accounts" },
                { name: "agency-holding-company", type: "accounts" }, 
                { name: "brand", type: "brands" }, 
                { name: "bill-to-account", type: "accounts" },
                { name: "partner", type: "accounts" },
                { name: "opportunity", type: "opportunities" },
                { name: "owner", type: "users" },
                { name: "rate-card", type: "rate-cards" }
            ]
        };

        // Legacy CSV Data for other resources
        const RAW_CSV_DATA = `
accounts,account-type

line-items,ad-locations

groups,ad-server

groups,budget

groups,cost-basis
groups,cost-per-unit
groups,currency-code
groups,custom-fields
groups,daily-budget
groups,description
groups,end-date
groups,funding-source
groups,id
groups,last-modified
groups,lifetime-budget
groups,name
groups,objective
groups,po-number
groups,pricing-budget-type
groups,shared-budget
groups,start-date
groups,time-zone
        `;

        const parseData = (csv) => {
            const lines = csv.trim().split('\n');
            const data = {};
            lines.forEach(line => {
                const parts = line.trim().split(',');
                const resource = parts[0];
                const attribute = parts[1];
                if (resource && attribute) {
                    if (!data[resource]) data[resource] = [];
                    data[resource].push(attribute);
                }
            });
            Object.keys(data).forEach(key => data[key].sort());
            return data;
        };

        const CSV_DATA_MAP = parseData(RAW_CSV_DATA);

        // Merge Campaign Config into Data Map structure
        const DATA_MAP = {
            ...CSV_DATA_MAP,
            campaigns: [
                ...CAMPAIGN_CONFIG.attributes.map(a => a.name),
                ...CAMPAIGN_CONFIG.relationships.map(r => `rel:${r.name}`) 
            ]
        };

        // --- Components ---

        const Icon = ({ name, size = 18, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const App = () => {
            const [selectedResource, setSelectedResource] = useState('campaigns');
            const [selections, setSelections] = useState({});
            const [copied, setCopied] = useState(false);
            const [detectedTypes, setDetectedTypes] = useState({}); 

            // AI States
            const [promptText, setPromptText] = useState("");
            const [isSelecting, setIsSelecting] = useState(false);
            const [isGeneratingMock, setIsGeneratingMock] = useState(false);
            const [mockData, setMockData] = useState(null);
            const [showMock, setShowMock] = useState(false);
            
            // API Key Management
            const [userKey, setUserKey] = useState(apiKey || localStorage.getItem('gemini_api_key') || "");
            const [showSettings, setShowSettings] = useState(false);
            
            // Import Modal
            const [showImport, setShowImport] = useState(false);
            const [importText, setImportText] = useState("");

            useEffect(() => {
                if (apiKey) setUserKey(apiKey);
            }, []);

            const handleSaveKey = (key) => {
                setUserKey(key);
                localStorage.setItem('gemini_api_key', key);
                setShowSettings(false);
            };

            // Reset or Init Selections
            useEffect(() => {
                if (!selections[selectedResource]) {
                    setSelections(prev => ({
                        ...prev,
                        [selectedResource]: { attributes: {}, relationships: {} }
                    }));
                }
                setShowMock(false);
                setMockData(null);
            }, [selectedResource]);
            
            const handleToggle = (type, name) => {
                setSelections(prev => {
                    const resSel = prev[selectedResource] || { attributes: {}, relationships: {} };
                    const groupSel = resSel[type] || {};
                    
                    return {
                        ...prev,
                        [selectedResource]: {
                            ...resSel,
                            [type]: {
                                ...groupSel,
                                [name]: !groupSel[name]
                            }
                        }
                    };
                });
                if (showMock) setShowMock(false);
            };

            const handleSelectAll = () => {
                const resSel = { attributes: {}, relationships: {} };
                
                if (selectedResource === 'campaigns') {
                    CAMPAIGN_CONFIG.attributes.forEach(a => resSel.attributes[a.name] = true);
                    CAMPAIGN_CONFIG.relationships.forEach(r => resSel.relationships[r.name] = true);
                } else {
                    const attrs = CSV_DATA_MAP[selectedResource] || [];
                    attrs.forEach(a => resSel.attributes[a] = true);
                }
                
                setSelections(prev => ({ ...prev, [selectedResource]: resSel }));
                setShowMock(false);
            };

            const handleDeselectAll = () => {
                setSelections(prev => ({ 
                    ...prev, 
                    [selectedResource]: { attributes: {}, relationships: {} } 
                }));
                setShowMock(false);
            };

            const handleImportJSON = () => {
                 try {
                    const parsed = JSON.parse(importText);
                    const attributes = parsed.data?.attributes || parsed.attributes || parsed;
                    const relationships = parsed.data?.relationships || parsed.relationships || {};

                    const newTypes = { ...(detectedTypes[selectedResource] || {}) };
                    const resSel = { attributes: {}, relationships: {} };
                    
                    // Attributes
                    Object.keys(attributes).forEach(key => {
                        resSel.attributes[key] = true;
                        const value = attributes[key];
                        if (Array.isArray(value)) newTypes[key] = 'array';
                        else if (typeof value === 'boolean') newTypes[key] = 'boolean';
                        else if (typeof value === 'number') newTypes[key] = 'number';
                        else if (typeof value === 'object' && value !== null) newTypes[key] = 'object';
                        else newTypes[key] = 'string';
                    });

                    // Relationships
                    Object.keys(relationships).forEach(key => {
                        resSel.relationships[key] = true;
                    });

                    setDetectedTypes(prev => ({ ...prev, [selectedResource]: newTypes }));
                    setSelections(prev => ({ ...prev, [selectedResource]: resSel }));

                    setShowImport(false);
                    setImportText("");
                    alert(`Imported!`);

                } catch (e) {
                    alert("Invalid JSON format.");
                }
            };
            
            const generateOutput = () => {
                const resSel = selections[selectedResource] || { attributes: {}, relationships: {} };
                const activeAttrs = Object.keys(resSel.attributes).filter(k => resSel.attributes[k]);
                const activeRels = Object.keys(resSel.relationships).filter(k => resSel.relationships[k]);
                const types = detectedTypes[selectedResource] || {};

                const url = `https://api.placements.io/v1/${selectedResource}/{{id}}`;
                
                let jsonString = "";

                if (showMock && mockData) {
                    jsonString = JSON.stringify({ data: { ...mockData } }, null, 2);
                } else {
                    let attrsLines = activeAttrs
                        .filter(a => a !== 'id') 
                        .map(attr => {
                            let value = `"${attr}": "{{${attr}}}"`; 
                            
                            if (selectedResource === 'campaigns') {
                                const config = CAMPAIGN_CONFIG.attributes.find(c => c.name === attr);
                                if (config) {
                                    if (config.type === 'boolean' || config.type === 'number') value = `"${attr}": {{${attr}}}`;
                                    else if (config.type === 'array') value = `"${attr}": []`;
                                    else if (config.type === 'object') value = `"${attr}": {{${attr}}}`;
                                }
                            } else {
                                const type = types[attr] || 'string';
                                if (type === 'boolean' || type === 'number') value = `"${attr}": {{${attr}}}`;
                                else if (type === 'array') value = `"${attr}": ["{{${attr}}}"]`;
                                else if (type === 'object') value = `"${attr}": {{${attr}}}`;
                            }
                            return `      ${value}`;
                        })
                        .join(',\n');

                    let relsLines = "";
                    if (activeRels.length > 0) {
                        relsLines = activeRels.map(rel => {
                            let relType = "unknown";
                            if (selectedResource === 'campaigns') {
                                const rConfig = CAMPAIGN_CONFIG.relationships.find(r => r.name === rel);
                                if (rConfig) relType = rConfig.type;
                            }
                            
                            return `      "${rel}": {
        "data": {
          "type": "${relType}",
          "id": "{{${rel}_id}}"
        }
      }`;
                        }).join(',\n');
                    }

                    const attrSection = attrsLines ? `\n    "attributes": {\n${attrsLines}\n    }` : "";
                    const relSection = relsLines ? `,\n    "relationships": {\n${relsLines}\n    }` : "";

                    jsonString = `{
  "data": {
    "id": "{{id}}",
    "type": "${selectedResource}"${attrSection}${relSection}
  }
}`;
                }

                return { url, json: jsonString, activeAttrs, activeRels };
            };

            const { url, json, activeAttrs, activeRels } = generateOutput();

            const copyToClipboard = (text) => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            
            const downloadExcel = () => {
                 const allFields = [...activeAttrs, ...activeRels];
                 if (allFields.length === 0) { alert("Select something first"); return; }
                 const wsData = [allFields];
                 const wb = XLSX.utils.book_new();
                 const ws = XLSX.utils.aoa_to_sheet(wsData);
                 XLSX.utils.book_append_sheet(wb, ws, selectedResource);
                 XLSX.writeFile(wb, `${selectedResource}_import.xlsx`);
            };

            // Render Helpers
            const renderCampaignView = () => {
                const resSel = selections['campaigns'] || { attributes: {}, relationships: {} };
                
                return (
                    <div className="flex-1 overflow-y-auto p-6">
                        {/* Attributes Section */}
                        <div className="mb-8">
                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-100 pb-2">
                                Attributes (Writable)
                            </h3>
                            {/* CHANGED: grid-cols-1 md:grid-cols-2 (removed lg:grid-cols-3) to give more width */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {CAMPAIGN_CONFIG.attributes.map(attr => (
                                    <label key={attr.name} className={`flex items-start p-3 rounded-lg border cursor-pointer transition-all ${resSel.attributes[attr.name] ? 'border-blue-500 bg-blue-50/50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                        <input 
                                            type="checkbox" 
                                            className="mt-0.5 h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 shrink-0"
                                            checked={!!resSel.attributes[attr.name]}
                                            onChange={() => handleToggle('attributes', attr.name)}
                                        />
                                        <div className="ml-3 flex-1 flex flex-col min-w-0"> {/* ADDED: min-w-0 to prevent flex overflow */}
                                            <div className="flex justify-between items-start gap-2">
                                                <span className="text-sm text-gray-700 font-medium break-words leading-tight" title={attr.name}>{attr.name}</span>
                                                <span className="shrink-0 text-[10px] text-gray-400 uppercase bg-gray-100 px-1.5 rounded leading-none py-0.5">{attr.type}</span>
                                            </div>
                                        </div>
                                    </label>
                                ))}
                            </div>
                        </div>

                        {/* Relationships Section */}
                        <div>
                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-100 pb-2">
                                Relationships
                            </h3>
                            {/* CHANGED: grid-cols-1 md:grid-cols-2 (removed lg:grid-cols-3) */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {CAMPAIGN_CONFIG.relationships.map(rel => (
                                    <label key={rel.name} className={`flex items-start p-3 rounded-lg border cursor-pointer transition-all ${resSel.relationships[rel.name] ? 'border-purple-500 bg-purple-50/50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                        <input 
                                            type="checkbox" 
                                            className="mt-0.5 h-4 w-4 text-purple-600 rounded border-gray-300 focus:ring-purple-500 shrink-0"
                                            checked={!!resSel.relationships[rel.name]}
                                            onChange={() => handleToggle('relationships', rel.name)}
                                        />
                                        <div className="ml-3 flex-1 flex flex-col min-w-0"> {/* ADDED: min-w-0 */}
                                            <div className="flex justify-between items-start gap-2">
                                                <span className="text-sm text-gray-700 font-medium break-words leading-tight" title={rel.name}>{rel.name}</span>
                                                <span className="shrink-0 text-[10px] text-purple-600 bg-purple-100 px-1.5 rounded leading-none py-0.5">{rel.type}</span>
                                            </div>
                                        </div>
                                    </label>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderGenericView = () => {
                const attrs = CSV_DATA_MAP[selectedResource] || [];
                const resSel = selections[selectedResource] || { attributes: {}, relationships: {} };
                
                return (
                    <div className="flex-1 overflow-y-auto p-6">
                        {/* CHANGED: grid-cols-1 md:grid-cols-2 to match campaign view consistency */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {attrs.map(attr => (
                                <label key={attr} className={`flex items-center p-3 rounded-lg border cursor-pointer transition-all ${resSel.attributes[attr] ? 'border-blue-500 bg-blue-50/50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                    <input 
                                        type="checkbox" 
                                        className="h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                                        checked={!!resSel.attributes[attr]}
                                        onChange={() => handleToggle('attributes', attr)}
                                    />
                                    <div className="ml-3 flex-1 min-w-0"> {/* ADDED: min-w-0 */}
                                        <span className="text-sm text-gray-700 font-medium truncate block">{attr}</span>
                                    </div>
                                </label>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-screen bg-gray-50 relative">
                     {/* Settings Modal */}
                    {showSettings && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-96 max-w-full m-4">
                                <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                                    <Icon name="key" size={20} className="text-purple-600" />
                                    API Configuration
                                </h3>
                                <input 
                                    type="password" 
                                    placeholder="Paste API Key here..." 
                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 mb-4 text-sm"
                                    defaultValue={userKey}
                                    id="apiKeyInput"
                                />
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                                    <button onClick={() => handleSaveKey(document.getElementById('apiKeyInput').value)} className="px-4 py-2 text-sm bg-purple-600 text-white hover:bg-purple-700 rounded-lg">Save Key</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Import Modal */}
                    {showImport && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-[500px] max-w-full m-4 flex flex-col h-[600px]">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                                        <Icon name="file-json" size={20} className="text-blue-600" />
                                        Import Sample JSON
                                    </h3>
                                    <button onClick={() => setShowImport(false)} className="text-gray-400 hover:text-gray-600">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <textarea 
                                    className="flex-1 w-full p-4 bg-gray-50 border border-gray-300 rounded-lg font-mono text-xs focus:ring-2 focus:ring-blue-500 resize-none mb-4"
                                    placeholder='{ "data": { "attributes": { ... }, "relationships": { ... } } }'
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                ></textarea>
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setShowImport(false)} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                                    <button onClick={handleImportJSON} className="px-4 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg font-medium">Analyze & Import</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                <Icon name="database" />
                            </div>
                            <h1 className="text-xl font-bold text-gray-800">Placements.io Payload Builder</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={() => setShowSettings(true)}
                                className={`p-2 rounded-lg transition-colors ${userKey ? 'text-gray-400 hover:text-gray-600 hover:bg-gray-100' : 'text-red-500 bg-red-50 hover:bg-red-100'}`}
                            >
                                <Icon name="settings" size={20} />
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar: Resources */}
                        <nav className="w-64 bg-white border-r border-gray-200 flex-shrink-0 overflow-y-auto hidden md:block">
                            <div className="p-4">
                                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Resources</h2>
                                <ul className="space-y-1">
                                    {/* Campaign Button */}
                                    <li>
                                        <button
                                            onClick={() => setSelectedResource('campaigns')}
                                            className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${
                                                selectedResource === 'campaigns'
                                                    ? 'bg-blue-50 text-blue-700'
                                                    : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                                            }`}
                                        >
                                            <Icon name="box" size={16} />
                                            <span>Campaigns</span>
                                        </button>
                                    </li>
                                    {/* Other Resources */}
                                    {Object.keys(CSV_DATA_MAP).map(resource => (
                                        <li key={resource}>
                                            <button
                                                onClick={() => setSelectedResource(resource)}
                                                className={`w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-md transition-colors ${
                                                    selectedResource === resource
                                                        ? 'bg-blue-50 text-blue-700'
                                                        : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                                                }`}
                                            >
                                                <Icon name="box" size={16} />
                                                <span className="capitalize">{resource}</span>
                                            </button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </nav>

                        {/* Main Content */}
                        <main className="flex-1 flex flex-col min-w-0 bg-white">
                            <div className="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                                <div>
                                    <h2 className="text-lg font-medium text-gray-900 capitalize flex items-center gap-2">
                                        {selectedResource} 
                                    </h2>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowImport(true)} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded border border-blue-200">
                                        <Icon name="file-json" size={14} /> Import
                                    </button>
                                    <div className="h-6 w-px bg-gray-300 mx-1"></div>
                                    <button onClick={handleSelectAll} className="px-3 py-1.5 text-xs font-medium text-gray-700 bg-white hover:bg-gray-50 rounded border border-gray-300">Select All</button>
                                    <button onClick={handleDeselectAll} className="px-3 py-1.5 text-xs font-medium text-gray-700 bg-white hover:bg-gray-50 rounded border border-gray-300">Clear</button>
                                </div>
                            </div>

                            {selectedResource === 'campaigns' ? renderCampaignView() : renderGenericView()}
                        </main>

                        {/* Right Panel: Preview & Output */}
                        <aside className="w-96 bg-gray-900 text-white flex flex-col border-l border-gray-700 shadow-xl z-20">
                            <div className="p-4 border-b border-gray-700 flex justify-between items-center">
                                <h3 className="text-sm font-semibold uppercase tracking-wider text-gray-400">Postman Configuration</h3>
                            </div>

                            {/* URL Section */}
                            <div className="p-4 border-b border-gray-800">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-xs text-gray-400 font-medium">Request URL</label>
                                    <span className="px-2 py-0.5 rounded bg-green-900 text-green-300 text-[10px] font-bold">POST/PATCH</span>
                                </div>
                                <div className="bg-black p-3 rounded border border-gray-700 font-mono text-xs break-all text-green-400 relative group">
                                    {url}
                                    <button onClick={() => copyToClipboard(url)} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-1 bg-gray-700 rounded hover:bg-gray-600 transition-all">
                                        <Icon name="copy" size={14} className="text-white" />
                                    </button>
                                </div>
                            </div>

                            {/* JSON Body Section */}
                            <div className="flex-1 flex flex-col min-h-0">
                                <div className="p-4 pb-2 flex justify-between items-center bg-gray-900">
                                    <label className="text-xs text-gray-400 font-medium">JSON Body</label>
                                    <button onClick={() => copyToClipboard(json)} className="flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
                                        {copied ? <Icon name="check" size={12}/> : <Icon name="copy" size={12}/>}
                                        {copied ? 'Copied' : 'Copy'}
                                    </button>
                                </div>
                                <div className="flex-1 relative overflow-hidden bg-[#1e1e1e]">
                                    <pre className="absolute inset-0 p-4 overflow-auto font-mono text-xs text-blue-100 custom-scrollbar">
                                        {json}
                                    </pre>
                                </div>
                            </div>

                            {/* Actions / Export */}
                            <div className="p-4 bg-gray-800 border-t border-gray-700">
                                <button onClick={downloadExcel} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-md text-sm font-medium transition-colors shadow-lg">
                                    <Icon name="file-spreadsheet" size={16} /> Download Excel Template
                                </button>
                                <p className="text-[10px] text-gray-500 mt-2 text-center">
                                    Includes {activeAttrs.length} attrs, {activeRels.length} rels.
                                </p>
                            </div>
                        </aside>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
